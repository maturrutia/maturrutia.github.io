<section class="hero" id="hero">
  <canvas class="hero-canvas" id="hero-canvas"></canvas>
  <div class="hero-content container">
    <div class="hero-text">
      <h1 class="hero-title">
        <span class="hero-greeting">Hi, I'm</span>
        <span class="hero-name gradient-text">{{ site.data.resume.name }}</span>
      </h1>
      <p class="hero-subtitle">{{ site.data.resume.title }}</p>
      <p class="hero-tagline">{{ site.data.resume.tagline }}</p>
      <div class="hero-buttons">
        <a href="#experience" class="btn btn-primary">View Work</a>
        <a href="#contact" class="btn btn-secondary">Contact Me</a>
      </div>
    </div>
    <div class="scroll-indicator">
      <span class="scroll-text">Scroll Down</span>
      <svg class="scroll-arrow" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <polyline points="19 12 12 19 5 12"></polyline>
      </svg>
    </div>
  </div>
</section>
